version: "3.8"
services:
  dj_forge_postgresql:
    image: postgres:latest
    environment:
      - POSTGRES_PASSWORD=dj_forge_password
      - POSTGRES_USER=dj_forge_user
      - POSTGRES_DB=dj_forge_main_database
    healthcheck:
      test:
        [
          "CMD",
          "pg_isready",
          "-U",
          "dj_forge_user",
          "-d",
          "dj_forge_main_database",
        ]
      interval: 1m
      timeout: 5s
      retries: 2
      start_period: 1m
    ports:
      - "5432:5432"
    networks:
      - dj_forge_network
    volumes:
      - dj_forge_postgresql_data:/var/lib/postgresql/data
    labels:
      - "net.djforge=true"
  #
  # https://hub.docker.com/r/dpage/pgadmin4/
  #
  pgadmin:
    image: dpage/pgadmin4
    environment:
      - PGADMIN_DEFAULT_EMAIL=pgadmin@djforge.net
      - PGADMIN_DEFAULT_PASSWORD=pgadmin_password
    ports:
      - "5050:80"
    networks:
      - dj_forge_network
    labels:
      - "net.djforge=true"
    volumes:
      # From documentation:
      # > /var/lib/pgadmin
      # > This is the working directory in which pgAdmin stores session data,
      # > user files, configuration files, and it’s configuration database.
      # > Mapping this directory onto the host machine gives you an easy way
      # > to maintain configuration between invocations of the container.
      - dj_forge_pgadmin:/var/lib/pgadmin
    restart: always
    depends_on:
      - dj_forge_postgresql
    healthcheck:
      test:
        [
          "CMD",
          "pg_isready",
          "-U",
          "dj_forge_user",
          "-d",
          "dj_forge_main_database",
        ]
      interval: 1m
      timeout: 5s
      retries: 2
      start_period: 1m

networks:
  dj_forge_network:
    name: dj_forge_network

volumes:
  dj_forge_postgresql_data:
    labels:
      - "net.djforge=true"
  dj_forge_pgadmin:
    labels:
      - "net.djforge=true"
