version: "3.8"
services:
  dj_forge_postgresql:
    image: postgres:latest
    environment:
      - POSTGRES_PASSWORD=dj_forge_user_password
      - POSTGRES_USER=dj_forge_user
      - POSTGRES_DB=dj_forge_main_app_database
    healthcheck:
      test:
        [
          "CMD",
          "pg_isready",
          "-U",
          "dj_forge_user",
          "-d",
          "dj_forge_main_database",
        ]
      interval: 1m
      timeout: 5s
      retries: 2
      start_period: 1m
    ports:
      - "5432:5432"
    networks:
      - dj_forge_network
    volumes:
      - dj_forge_postgresql_data:/var/lib/postgresql/data

networks:
  dj_forge_network:
    name: dj_forge_network

volumes:
  dj_forge_postgresql_data:
