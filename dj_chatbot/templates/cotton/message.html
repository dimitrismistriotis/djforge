{% comment %}
  Display Message.

  PARAMETERS

    — message: Object to be passed by value, each one should have the following attributes:
        — sender: Type of sender
        — sender_name: Display name of sender
        — message: Message payload

  EXAMPLES

  <c-message :message="{'sender': 'user', 'sender_name'='Joe', 'message'='Hi!'}" />
{% endcomment %}
<c-vars message="" />

<div class="mb-4 {% if message.sender == 'user' %}text-right{% else %}text-left{% endif %}">
  <div class="inline-block max-w-xs lg:max-w-md px-4 py-2 rounded-lg {% if message.sender == 'user' %}bg-blue-600 text-white{% else %}bg-white dark:bg-gray-600 text-gray-800 dark:text-white border{% endif %}">
    <div class="text-xs font-semibold mb-1 {% if message.sender == 'user' %}text-blue-100{% else %}text-gray-600 dark:text-gray-300{% endif %}">
      {{ message.sender_name }}
    </div>

    <div>{{ message.message }}</div>
  </div>
</div>
