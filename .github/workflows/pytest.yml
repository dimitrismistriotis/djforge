name: Run Python tests
#
# Sources:
#
# - https://docs.astral.sh/uv/guides/integration/github
# - https://docs.github.com/en/actions/using-containerized-services/creating-postgresql-service-containers
# - https://github.com/marketplace/actions/run-pytest
#
on: [push]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    env:
      DEBUG: on
      DJANGO_ENV: test
    services:
      postgres:
        image: postgres:latest
        # service environment variables
        # `POSTGRES_HOST` is `postgres`
        env:
          #
          # Defaults from settings.py for when DATABASE_URL is not set.
          #
          POSTGRES_DB: "dj_forge_main_database"
          POSTGRES_USER: "dj_forge_user"
          POSTGRES_PASSWORD: "dj_forge_password"
        # Set health checks to wait until postgres has started
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          # Maps tcp port 5432 on service container to the host
          - 5432:5432
    strategy:
      matrix:
        #
        # Using Matrix to be easier to introduce next version.
        # Generally one version supported at a time.
        #
        python-version: ["3.12"]
    steps:
      - uses: szenius/set-timezone@v1.2
        with:
          timezoneLinux: "Europe/London"
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          # Install a specific version of uv:
          version: "0.7.5"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"
      - name: Install dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: make install
      - uses: pavelzw/pytest-action@v2
        with:
          emoji: true
          verbose: true
          job-summary: true
          custom-pytest: "uv run pytest --ruff --ruff-format"
