name: Run Python tests
#
# Sources:
# - https://docs.github.com/en/actions/using-containerized-services/creating-postgresql-service-containers
# - https://github.com/marketplace/actions/run-pytest
# - https://github.com/marketplace/actions/install-poetry-action
# - https://github.com/snok/install-poetry
# - https://stackoverflow.com/questions/62977821/how-to-cache-poetry-install-for-github-actions
#
on: [push]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    env:
      DEBUG: on
      DJANGO_ENV: test
    services:
      postgres:
        image: postgres:latest
        # service environment variables
        # `POSTGRES_HOST` is `postgres`
        env:
          #
          # Defaults from settings.py for when DATABASE_URL is not set.
          #
          POSTGRES_DB: "dj_forge_main_database"
          POSTGRES_USER: "dj_forge_user"
          POSTGRES_PASSWORD: "dj_forge_password"
        # Set health checks to wait until postgres has started
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          # Maps tcp port 5432 on service container to the host
          - 5432:5432
    strategy:
      matrix:
        #
        # Using Matrix to be easier to introduce next version.
        # Generally one version supported at a time.
        #
        python-version: ["3.12"]
    steps:
      - uses: szenius/set-timezone@v1.2
        with:
          timezoneLinux: "Europe/London"
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Load cached Poetry installation
        id: cached-poetry
        uses: actions/cache@v3
        with:
          path: ~/.local  # the path depends on the OS
          key: poetry-0  # increment to reset cache
      - name: Install Poetry
        if: steps.cached-poetry.outputs.cache-hit != 'true'
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true
      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}
      - name: Install dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: make install
      - uses: pavelzw/pytest-action@v2
        with:
          emoji: true
          verbose: true
          job-summary: true
          custom-pytest: "poetry run pytest"
#      - name: Run tests
#        run: make test
